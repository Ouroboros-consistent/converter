<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeightShift — KG ↔ LBS</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0e0e0f;
        --surface: #18181b;
        --border: #2a2a2e;
        --accent: #d4f04a;
        --accent-dim: rgba(212, 240, 74, 0.12);
        --text: #f0f0ee;
        --muted: #6b6b72;
        --input-bg: #111113;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        overflow: hidden;
        position: relative;
      }

      /* Background noise texture */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* Glowing orb */
      body::after {
        content: "";
        position: fixed;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(212, 240, 74, 0.07) 0%,
          transparent 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 0;
      }

      .card {
        position: relative;
        z-index: 1;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 3rem 3rem 2.5rem;
        width: 100%;
        max-width: 480px;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.03),
          0 40px 80px rgba(0, 0, 0, 0.6);
        animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .badge {
        display: inline-block;
        font-family: "DM Mono", monospace;
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent);
        background: var(--accent-dim);
        border: 1px solid rgba(212, 240, 74, 0.25);
        padding: 4px 12px;
        border-radius: 99px;
        margin-bottom: 1.2rem;
      }

      h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3.5rem;
        letter-spacing: 0.03em;
        line-height: 1;
        color: var(--text);
        margin-bottom: 0.3rem;
      }

      h1 span {
        color: var(--accent);
      }

      .subtitle {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 2.5rem;
        font-weight: 300;
      }

      .fields {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .field-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      label {
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      input[type="number"] {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem 4.5rem 1rem 1.2rem;
        font-size: 1.4rem;
        font-family: "DM Mono", monospace;
        color: var(--text);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        -moz-appearance: textfield;
        appearance: textfield;
      }

      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }

      input[type="number"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(212, 240, 74, 0.1);
      }

      input[type="number"].readonly {
        background: rgba(212, 240, 74, 0.04);
        border-color: rgba(212, 240, 74, 0.2);
        color: var(--accent);
        cursor: default;
      }

      .unit-badge {
        position: absolute;
        right: 1rem;
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
        color: var(--muted);
        letter-spacing: 0.05em;
        pointer-events: none;
      }

      .input-wrap:focus-within .unit-badge {
        color: var(--accent);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        color: var(--muted);
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .divider-icon {
        font-size: 0.9rem;
        color: var(--muted);
        transition: transform 0.3s;
      }

      .clear-btn {
        margin-top: 1.5rem;
        width: 100%;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0.75rem;
        color: var(--muted);
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s;
      }

      .clear-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-dim);
      }

      .footer {
        position: relative;
        z-index: 1;
        margin-top: 1.5rem;
        font-size: 0.7rem;
        color: #3a3a40;
        font-family: "DM Mono", monospace;
        letter-spacing: 0.08em;
        text-align: center;
      }

      /* Pulse when result updates */
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 3px rgba(212, 240, 74, 0.3);
        }
        100% {
          box-shadow: 0 0 0 3px rgba(212, 240, 74, 0);
        }
      }

      .result-pulse {
        animation: pulse 0.4s ease-out;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">Weight Converter</div>
      <h1>WEIGHT<span>SHIFT</span></h1>
      <p class="subtitle">Konversi berat instan — Kilogram ke Pounds</p>

      <div class="fields">
        <div class="field-group">
          <label>Kilogram (KG)</label>
          <div class="input-wrap">
            <input
              type="number"
              id="kg-input"
              placeholder="0.00"
              min="0"
              step="any"
              autocomplete="off"
            />
            <span class="unit-badge">KG</span>
          </div>
        </div>

        <div class="divider">
          <span class="divider-icon">⇅</span>
        </div>

        <div class="field-group">
          <label>Pounds (LBS)</label>
          <div class="input-wrap">
            <input
              type="number"
              id="lbs-output"
              class="readonly"
              placeholder="0.00"
              readonly
            />
            <span class="unit-badge">LBS</span>
          </div>
        </div>
      </div>

      <button class="clear-btn" id="clear-btn">↺ &nbsp; Reset</button>
    </div>

    <p class="footer">
      1 KG = 2.20462 LBS &nbsp;·&nbsp; frontend by Claude &nbsp;·&nbsp; backend
      by Ouroboros
    </p>

    <script>
      const kgInput = document.getElementById("kg-input");
      const lbsOutput = document.getElementById("lbs-output");
      const clearBtn = document.getElementById("clear-btn");

      // ─── Koneksi ke backend ─────────────────────────────────────────
      // Saat ini pakai konversi lokal sebagai fallback.
      // Ganti fungsi convertKgToLbs() dengan fetch ke endpoint kamu.

      async function convertKgToLbs(kg) {
        const res = await fetch(`/api/convert?kg=${kg}&metric=kg`);
        const data = await res.json();
        return data.lbs;
      }
      // ────────────────────────────────────────────────────────────────

      async function handleInput() {
        const val = parseFloat(kgInput.value);

        if (isNaN(val) || kgInput.value === "") {
          lbsOutput.value = "";
          return;
        }

        const result = await convertKgToLbs(val);
        lbsOutput.value = result.toFixed(4);

        // Animasi pulse saat hasil muncul
        lbsOutput.classList.remove("result-pulse");
        void lbsOutput.offsetWidth;
        lbsOutput.classList.add("result-pulse");
      }

      kgInput.addEventListener("input", handleInput);

      clearBtn.addEventListener("click", () => {
        kgInput.value = "";
        lbsOutput.value = "";
        kgInput.focus();
      });
    </script>
  </body>
</html>
